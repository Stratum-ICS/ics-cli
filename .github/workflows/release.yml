# Builds prebuilt `ics` binaries and attaches them to a published GitHub Release.
# Create a release (tag + notes), set it to Published — artifacts upload automatically.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  upload-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ics
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tar: unix
          zip: windows
